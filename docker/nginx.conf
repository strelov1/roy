server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS server. Re-resolve `roy-management` per request
    # so a `docker compose up -d` that recreates the upstream (and assigns
    # it a new IP) doesn't leave nginx pointing at a dead address.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Strip the `/management` prefix and forward to roy-management.
    # roy-web sends its API + /auth/login calls to /management/*; the dev
    # vite proxy does the same rewrite (see workspace/vite.config.ts).
    location /management/ {
        # Setting upstream in a variable forces per-request DNS resolution
        # (otherwise nginx resolves the `proxy_pass` literal once at start).
        # When proxy_pass uses a variable, nginx skips the automatic URI
        # rewrite that `proxy_pass http://up/;` would do, so we strip the
        # `/management` prefix ourselves.
        set $upstream "http://roy-management:8079";
        rewrite ^/management/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cookies (JWT session) need to flow back unmodified.
        proxy_pass_request_headers on;
        # Builder /run streams Server-Sent-Events; disable buffering.
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # SPA fallback for client-side routes like /agents/<id>.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
