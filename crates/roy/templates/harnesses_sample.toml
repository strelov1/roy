# ~/.config/roy/harnesses.toml
#
# Configured harnesses for roy. A harness is one of the ACP-adapter
# binaries (claude-code-acp, gemini, opencode, codex-acp, pi-acp) that
# roy spawns to drive a session. The binaries must be installed and
# authenticated on this machine. Uncomment the block(s) for the
# harnesses you actually have.
#
# Models are display-only labels — roy doesn't route by model. Pick the
# string that matches what the underlying harness expects internally
# (e.g. `claude-sonnet-4-6` for claude-code-acp's slash-command).

# ---------- claude-code-acp ----------
# [[harness]]
# name = "claude"
#
# [[harness.models]]
# id = "claude-sonnet-4-6"
# label = "Claude Sonnet 4.6"
# default = true
#
# [[harness.models]]
# id = "claude-opus-4-7"
# label = "Claude Opus 4.7"
#
# [[harness.models]]
# id = "claude-opus-4-6"
# label = "Claude Opus 4.6"
#
# [[harness.models]]
# id = "claude-opus-4-5"
# label = "Claude Opus 4.5"
#
# [[harness.models]]
# id = "claude-haiku-4-5"
# label = "Claude Haiku 4.5"

# ---------- gemini --acp --skip-trust ----------
# [[harness]]
# name = "gemini"
#
# [[harness.models]]
# id = "gemini-2.5-pro"
# label = "Gemini 2.5 Pro"
# default = true
#
# [[harness.models]]
# id = "gemini-2.5-flash"
# label = "Gemini 2.5 Flash"

